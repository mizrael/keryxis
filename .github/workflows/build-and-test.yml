name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake pkg-config libssl-dev \
          libasound2-dev \
          libx11-dev libxi-dev libxtst-dev libxdo-dev \
          libxcb1-dev libxcb-randr0-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          libxkbcommon-dev libvulkan-dev
    - name: Build
      run: cargo build --no-default-features --features gui --verbose
    - name: Run tests
      run: cargo test --no-default-features --features gui --verbose

  release:
    needs: [build-macos, build-linux]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Add Intel target
      run: rustup target add x86_64-apple-darwin

    - name: Build release binaries (ARM64 + Intel)
      run: |
        cargo build --release --target aarch64-apple-darwin
        cargo build --release --target x86_64-apple-darwin

    - name: Package binaries
      run: |
        tar czf keryxis-macos-arm64.tar.gz -C target/aarch64-apple-darwin/release keryxis
        tar czf keryxis-macos-x86_64.tar.gz -C target/x86_64-apple-darwin/release keryxis

    - name: Generate version tag
      id: version
      run: |
        DATE_TAG="v$(date -u +%Y.%m.%d)"
        EXISTING=$(git tag -l "${DATE_TAG}.*" | sort -t. -k4 -n | tail -1)
        if [ -z "$EXISTING" ]; then
          SEQ=1
        else
          LAST_SEQ=$(echo "$EXISTING" | rev | cut -d. -f1 | rev)
          SEQ=$((LAST_SEQ + 1))
        fi
        VERSION="${DATE_TAG}.${SEQ}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ steps.version.outputs.version }}" \
          keryxis-macos-arm64.tar.gz \
          keryxis-macos-x86_64.tar.gz \
          --title "${{ steps.version.outputs.version }} (macOS)" \
          --generate-notes \
          --latest
