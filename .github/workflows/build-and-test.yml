name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build release binary
      run: cargo build --release

    - name: Package binary
      run: |
        ARCH=$(uname -m)
        tar czf keryxis-macos-${ARCH}.tar.gz -C target/release keryxis

    - name: Generate version tag
      id: version
      run: |
        DATE_TAG="v$(date -u +%Y.%m.%d)"
        EXISTING=$(git tag -l "${DATE_TAG}.*" | sort -t. -k4 -n | tail -1)
        if [ -z "$EXISTING" ]; then
          SEQ=1
        else
          LAST_SEQ=$(echo "$EXISTING" | rev | cut -d. -f1 | rev)
          SEQ=$((LAST_SEQ + 1))
        fi
        VERSION="${DATE_TAG}.${SEQ}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ steps.version.outputs.version }}" \
          keryxis-macos-*.tar.gz \
          --title "${{ steps.version.outputs.version }} (macOS)" \
          --generate-notes \
          --latest
